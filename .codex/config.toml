#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
review_model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_context_window = 539000
model_auto_compact_token_limit = 500000

developer_instructions = """
Runtime summary. Full policy lives in AGENTS.md; read it before any task.

Default workflow: explore -> review -> implement -> verify.
Start each task with a routing checkpoint. Route Lock required for long tasks.
After context compaction or recovery trigger, reconstruct a continuation
checkpoint before resuming; never restart from the beginning.
Codex chooses and invokes subagents. Model worker follows WORKER.md.
Default to the smallest defensible change. One write-capable agent at a time.
Final output order: confirmed facts, changes, verification, risks, next steps.
"""

sandbox_mode = "danger-full-access"
approval_policy = "never"
[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800
