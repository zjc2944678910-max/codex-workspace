#:schema https://developers.openai.com/codex/config-schema.json

review_model = "gpt-5.5"
model_context_window = 1000000
model_auto_compact_token_limit = 900000

sandbox_mode = "danger-full-access"
approval_policy = "never"

developer_instructions = """
Runtime summary; full policy lives in AGENTS.md.
This root is a workspace index. Route project work only from explicit project/path/service evidence.
Start substantive work with task level, rationale, and execution strategy.
Use the lightest safe path; reserve xhigh/full agent chains for L2, architecture/root-cause, production audits, and hard regressions.
OpenClaw/NAS/live/production is L2 read-only; L3 state changes require "进入修复阶段".
Use Route Lock for long tasks/handoffs and prefer compact file-pointer evidence.
Workers follow WORKER.md and return compact results.
"""

[features]
codex_hooks = true

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800
