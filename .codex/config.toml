#:schema https://developers.openai.com/codex/config-schema.json

review_model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_context_window = 539000
model_auto_compact_token_limit = 500000

sandbox_mode = "danger-full-access"
approval_policy = "never"

developer_instructions = """
Runtime summary. Full policy lives in AGENTS.md; read it before any task.

Default workflow: route -> classify -> implement -> verify.
Use Route Lock for long tasks and worker handoffs.
Codex chooses subagents; worker execution follows WORKER.md.
Keep changes scoped and preserve structured closeout for substantive work.
"""

[features]
codex_hooks = true

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800
